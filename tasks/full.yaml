- id: support_002
  domain: support_tickets
  question: What is the average satisfaction score for resolved tickets in each category?
  expected_answer:
    type: exact
    value: access
    tolerance: 0
    sql: 'SELECT t.category, AVG(t.satisfaction_score) AS avg_score

      FROM tickets t

      WHERE t.resolved_at IS NOT NULL AND t.satisfaction_score IS NOT NULL

      GROUP BY t.category

      ORDER BY avg_score DESC

      '
  required_concepts:
  - filter non-null resolved_at and satisfaction_score
  - group by category
  - aggregate AVG
  difficulty: medium
- id: support_003
