  difficulty: medium
- id: sales_007
  domain: sales_analytics
  question: What percentage of orders resulted in a refund?
  expected_answer:
    type: numeric
    value: 12.5
    tolerance: 0.01
    sql: "SELECT\n  (SELECT COUNT(DISTINCT order_id) FROM refunds) * 100.0 /\n  NULLIF((SELECT\
      \ COUNT(*) FROM orders), 0) AS refund_pct\n"
  required_concepts:
  - subquery for counts
  - percentage calculation
  - trap: count distinct order_ids
  difficulty: hard
- id: support_001
  domain: support_tickets
  question: How many P0 tickets were created by enterprise accounts?
