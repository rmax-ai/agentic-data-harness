tasks:
- id: sales_001
  domain: sales_analytics
  question: What was the total net revenue in euros from Dutch customers in Q1 2026?
  expected_answer:
    type: numeric
    value: 9559.47
    tolerance: 0.01
    sql: "SELECT\n  (COALESCE(SUM(o.total_cents), 0) - COALESCE(SUM(r.refund_cents),\
      \ 0)) / 100.0 AS net_revenue_eur\nFROM customers c\nJOIN orders o ON c.customer_id\
      \ = o.customer_id\nLEFT JOIN refunds r ON o.order_id = r.order_id\nWHERE c.country_code\
      \ = 'NL'\n  AND o.order_date >= '2026-01-01'\n  AND o.order_date <= '2026-03-31'\n\
      \  AND o.status = 'completed'\n"
  required_concepts:
  - join customers to orders on customer_id
  - filter country_code = 'NL'
  - subtract refunds
  - divide cents by 100
  difficulty: medium
- id: sales_002
  domain: sales_analytics
  question: How many completed orders were placed by German customers?
  expected_answer:
    type: numeric
    value: 25
    tolerance: 0
    sql: 'SELECT COUNT(*) AS order_count

      FROM customers c

      JOIN orders o ON c.customer_id = o.customer_id

      WHERE c.country_code = ''DE'' AND o.status = ''completed''

      '
  required_concepts:
  - join customers to orders
  - filter by country_code = 'DE'
  - filter by status = completed
  difficulty: easy
- id: sales_003
  domain: sales_analytics
  question: Which country had the highest total gross order value (in euros)?
  expected_answer:
    type: exact
    value: DE
    tolerance: 0
    sql: 'SELECT c.country_code, SUM(o.total_cents) / 100.0 AS total_eur

      FROM customers c

      JOIN orders o ON c.customer_id = o.customer_id

      WHERE o.status = ''completed''

      GROUP BY c.country_code

      ORDER BY total_eur DESC

      LIMIT 1

      '
  required_concepts:
  - group by country_code
  - sum and divide by 100
  - order by descending
  difficulty: medium
- id: sales_004
  domain: sales_analytics
  question: What is the average refund amount in euros per refunded order?
  expected_answer:
    type: numeric
    value: 727.53
    tolerance: 0.01
    sql: 'SELECT AVG(r.refund_cents) / 100.0 AS avg_refund_eur

      FROM refunds r

      JOIN orders o ON r.order_id = o.order_id

      '
  required_concepts:
  - aggregate AVG on refund_cents
  - divide cents by 100
  difficulty: easy
- id: sales_005
  domain: sales_analytics
  question: How many enterprise customers placed orders in Q2 2026?
  expected_answer:
    type: numeric
    value: 21
    tolerance: 0
    sql: "SELECT COUNT(DISTINCT c.customer_id) AS customer_count\nFROM customers c\n\
      JOIN orders o ON c.customer_id = o.customer_id\nWHERE c.segment = 'enterprise'\n\
      \  AND o.order_date >= '2026-04-01'\n  AND o.order_date <= '2026-06-30'\n"
  required_concepts:
  - count distinct
  - filter by segment = enterprise
  - date range Q2 2026
  difficulty: medium
- id: sales_006
  domain: sales_analytics
  question: What is the gross revenue in euros from Spanish customers who are in the
    midmarket segment?
  expected_answer:
    type: numeric
    value: 12893.54
    tolerance: 0.01
    sql: 'SELECT COALESCE(SUM(o.total_cents), 0) / 100.0 AS gross_revenue_eur

      FROM customers c

