      WHERE t.resolved_at IS NULL

      GROUP BY a.segment

      ORDER BY unresolved DESC

      LIMIT 1

      '
  required_concepts:
  - join tickets to accounts
  - filter unresolved (resolved_at IS NULL)
  - group by segment
  difficulty: medium
- id: support_004
