# Default configuration for agentic-data-harness
# Override per-mode or per-model settings in dedicated configs.

run:
  tasks: "tasks/small.yaml"
  mode: "raw"  # raw | cached | cached_memory
  output_dir: "reports"
  seed: 42

agent:
  max_steps: 8
  model: "gpt-5.4-mini"
  provider: "openai"
  temperature: 0
  max_output_tokens: 1200
  timeout_seconds: 60

database:
  path: "data/duckdb/benchmark.db"

cache:
  enabled: false
  memory_items_limit: 3
